<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="style.css" />
  <title>Guess My Number!</title>
</head>

<body>
  <header>
    <h1>Guess My Number!</h1>
    <p class="between" data-original="(Between 1 and 20)">(Between 1 and 20)</p>
    <button class="btn again">Again!</button>
    <div class="number">?</div>
  </header>
  <main>
    <section class="left">
      <input type="text" inputmode="numeric" min="1" max="20" class="guess" />
      <button class="btn check">Check!</button>
    </section>
    <section class="right">
      <p class="message">Start guessing...</p>
      <input type="text" class="yourName" placeholder="Enter your name" />
      <p class="label-score">💯 Score: <span class="score">20</span></p>
      <div class="highscore-container">
        <p class="label-highscore">
          🥇 Highscore:
          <!-- <span class="highscore">0</span> -->
        </p>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>

</html>
